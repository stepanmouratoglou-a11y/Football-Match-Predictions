<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Match Predictor by Stepan | Home</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --primary: #333333;
            --bg: #f8f9fa; /* Ελαφρώς σπασμένο λευκό για να κάνει αντίθεση η κάρτα */
            --font: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg);
            font-family: var(--font);
            color: var(--primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Σταθερό Header Πλοήγησης */
        header {
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 20px 0;
            border-bottom: 1px solid #eaeaea;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        nav a {
            text-decoration: none;
            color: #555;
            font-weight: 600;
            font-size: 1.1rem;
            padding: 8px 16px;
            border-radius: 8px;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        nav a:hover, nav a.active {
            background-color: #1a1a1a;
            color: #ffffff;
        }

        /* Κεντρικό Περιεχόμενο */
        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 40px 20px;
        }

        .main-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 60px 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
            border: 1px solid #ffffff;
            text-align: center;
            max-width: 800px;
            width: 100%;
        }

        h1 { font-size: 3rem; margin-bottom: 20px; font-weight: 300; letter-spacing: -1px; }
        p.subtitle { font-size: 1.2rem; color: #666; margin-bottom: 50px; }

        /* Πλέγμα Πρωταθλημάτων */
        .leagues-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .league-btn {
            display: block;
            text-decoration: none;
            background: #ffffff;
            color: #1a1a1a;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #eaeaea;
            font-size: 1.2rem;
            font-weight: 600;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            transition: border-color 0.2s ease, background-color 0.2s ease;
        }

        .league-btn:hover {
            border-color: #1a1a1a;
            background: #fafafa;
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <a href="index.html" class="active">Home</a>
            <a href="premier_league.html">Premier League</a>
            <a href="laliga.html">La Liga</a>
            <a href="ligue1.html">Ligue 1</a>
            <a href="bundesliga.html">Bundesliga</a>
            <a href="seriea.html">Serie A</a>
        </nav>
    </header>

    <div class="container">
        <div class="main-card">
            <h1>Football Match Predictor by Stepan</h1>
            <p class="subtitle">Επιλέξτε πρωτάθλημα για να δείτε τις προβλέψεις του αλγορίθμου μας.</p>
            
            <div class="leagues-grid">
                <a href="premier_league.html" class="league-btn">🇬🇧 Premier League</a>
                <a href="laliga.html" class="league-btn">🇪🇸 La Liga</a>
                <a href="ligue1.html" class="league-btn">🇫🇷 Ligue 1</a>
                <a href="bundesliga.html" class="league-btn">🇩🇪 Bundesliga</a>
                <a href="seriea.html" class="league-btn">🇮🇹 Serie A</a>
            </div>
        </div>
    </div>

</body>
</html>
