<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premier League Predictions | AI</title>
    <style>
        /* Ίδια βασικά styles με την αρχική για ομοιομορφία */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --primary: #333333; --bg: #f8f9fa; --font: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg); font-family: var(--font); color: var(--primary); min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        
        /* Σταθερό Header */
        header { width: 100%; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); padding: 20px 0; border-bottom: 1px solid #eaeaea; position: sticky; top: 0; z-index: 1000; }
        nav { display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; }
        nav a { text-decoration: none; color: #555; font-weight: 600; font-size: 1.1rem; padding: 8px 16px; border-radius: 8px; transition: background 0.2s, color 0.2s; }
        nav a:hover, nav a.active { background-color: #1a1a1a; color: #ffffff; }

        /* Κάρτα Πρόβλεψης (Σταθερή, 2D) */
        .container { flex: 1; display: flex; justify-content: center; align-items: center; width: 100%; padding: 40px 20px; }
        .main-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); border-radius: 20px; padding: 50px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); border: 1px solid #ffffff; width: 100%; max-width: 600px; text-align: center; }
        h1 { font-size: 2.2rem; margin-bottom: 40px; font-weight: 300; }

        /* Φόρμα */
        .selector-group { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px; }
        .select-container { text-align: left; }
        label { display: block; font-size: 0.9rem; font-weight: 600; margin-bottom: 10px; color: #555; }
        select { width: 100%; padding: 15px; border-radius: 8px; border: 1px solid #ccc; background: #fff; font-size: 1rem; cursor: pointer; outline: none; }
        select:focus { border-color: #1a1a1a; }
        
        .predict-btn { background: #1a1a1a; color: white; border: none; padding: 18px 40px; font-size: 1.1rem; border-radius: 50px; cursor: pointer; font-weight: 600; transition: background 0.2s; width: 100%; }
        .predict-btn:hover { background: #333333; }

        /* Αποτελέσματα */
        #result-section { margin-top: 40px; display: none; }
        #result-section.show { display: block; }
        .prediction-text { font-size: 1.6rem; font-weight: 400; margin-bottom: 25px; }
        .prob-bar-container { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
        .prob-box { background: #f8f8f8; padding: 15px; border-radius: 10px; border: 1px solid #eee; }
        .prob-label { font-size: 0.85rem; color: #777; margin-bottom: 5px; }
        .prob-value { font-size: 1.3rem; font-weight: 600; }
        #loading { display: none; margin-top: 20px; color: #777; }
    </style>
</head>
<body>

    <header>
        <nav>
            <a href="index.html">Home</a>
            <a href="premier_league.html" class="active">Premier League</a>
            <a href="laliga.html">La Liga</a>
            <a href="ligue1.html">Ligue 1</a>
            <a href="bundesliga.html">Bundesliga</a>
            <a href="seriea.html">Serie A</a>
        </nav>
    </header>

    <div class="container">
        <div class="main-card">
            <h1>🇬🇧 Premier League</h1>

            <div class="selector-group">
                <div class="select-container">
                    <label>Home Team</label>
                    <select id="home_team">
                    <option value="Arsenal">Arsenal</option>
                    <option value="Man City">Man City</option>
                    <option value="Liverpool">Liverpool</option>
                    <option value="Man United">Man United</option>
                    <option value="Tottenham">Tottenham</option>
                    <option value="Chelsea">Chelsea</option>
                    <option value="Nott'm Forest">Nottingham Forest</option>
                    <option value="Wolves">Wolves</option>
                    <option value="Newcastle">Newcastle</option>
                    <option value="Burnley">Burnley</option>
                    <option value="Leeds">Leeds</option>
                    <option value="Aston Villa">Aston Villa</option>
                    <option value="Bournemouth">Bournemouth</option>
                    <option value="Brighton">Brighton</option>
                    <option value="Fulham">Fulham</option>
                    <option value="Sunderland">Sunderland</option>
                    <option value="Crystal Palace">Crystal Palace</option>
                    <option value="West Ham">West Ham</option>
                    <option value="Brentford">Brentford</option>
                    <option value="Everton">Everton</option>
                    </select>
                </div>
                <div class="select-container">
                    <label>Away Team</label>
                    <select id="away_team">
                    <option value="Arsenal">Arsenal</option>
                    <option value="Man City">Man City</option>
                    <option value="Liverpool">Liverpool</option>
                    <option value="Man United">Man United</option>
                    <option value="Tottenham">Tottenham</option>
                    <option value="Chelsea">Chelsea</option>
                    <option value="Nott'm Forest">Nottingham Forest</option>
                    <option value="Wolves">Wolves</option>
                    <option value="Newcastle">Newcastle</option>
                    <option value="Burnley">Burnley</option>
                    <option value="Leeds">Leeds</option>
                    <option value="Aston Villa">Aston Villa</option>
                    <option value="Bournemouth">Bournemouth</option>
                    <option value="Brighton">Brighton</option>
                    <option value="Fulham">Fulham</option>
                    <option value="Sunderland">Sunderland</option>
                    <option value="Crystal Palace">Crystal Palace</option>
                    <option value="West Ham">West Ham</option>
                    <option value="Brentford">Brentford</option>
                    <option value="Everton">Everton</option>
                    </select>
                </div>
            </div>

            <button class="predict-btn" id="predictBtn">Predict Match</button>
            <div id="loading">Calculating probabilities...</div>

            <div id="result-section">
                <div class="prediction-text" id="finalPrediction">---</div>
                <div class="prob-bar-container">
                    <div class="prob-box">
                        <div class="prob-label">HOME (1)</div>
                        <div class="prob-value" id="probHome">--%</div>
                    </div>
                    <div class="prob-box">
                        <div class="prob-label">DRAW (X)</div>
                        <div class="prob-value" id="probDraw">--%</div>
                    </div>
                    <div class="prob-box">
                        <div class="prob-label">AWAY (2)</div>
                        <div class="prob-value" id="probAway">--%</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('predictBtn').addEventListener('click', async () => {
            const homeTeam = document.getElementById('home_team').value;
            const awayTeam = document.getElementById('away_team').value;
            const loading = document.getElementById('loading');
            const resultSection = document.getElementById('result-section');

            if (homeTeam === awayTeam) {
                alert("Παρακαλώ επιλέξτε διαφορετικές ομάδες.");
                return;
            }

            loading.style.display = 'block';
            resultSection.classList.remove('show');

            try {
                // ΕΔΩ ΒΑΖΕΙΣ ΤΟ API ΣΟΥ (π.χ. http://127.0.0.1:8000/predict_premier)
                // Για να δουλέψει σε όλα τα πρωταθλήματα, ίσως χρειαστείς διαφορετικά endpoints στο FastAPI!
                const response = await fetch('http://127.0.0.1:8000/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ home_team: homeTeam, away_team: awayTeam, home_days_rest: 7, away_days_rest: 7 }),
                });

                if (!response.ok) throw new Error('Σφάλμα API');
                const result = await response.json();

                document.getElementById('finalPrediction').innerText = result.Prediction;
                document.getElementById('probHome').innerText = result.Home_Win_Prob;
                document.getElementById('probDraw').innerText = result.Draw_Prob;
                document.getElementById('probAway').innerText = result.Away_Win_Prob;

                loading.style.display = 'none';
                resultSection.classList.add('show');
            } catch (error) {
                alert("Σφάλμα σύνδεσης. Τρέχει το Uvicorn;");
                loading.style.display = 'none';
            }
        });
    </script>
</body>
</html>
