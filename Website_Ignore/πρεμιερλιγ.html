<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premier League Predictions</title>
    <style>

        :root {
            --primary: #333333; /* Κομψό γκρι-μαύρο */
            --bg: #ffffff;      /* Καθαρό άσπρο */
            --font: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg);
            font-family: var(--font);
            color: var(--primary);
            overflow: hidden; /* Κρατάμε το 3D εφέ καθαρό */
        }

        /* Η "Γυάλινη" Κάρτα που επιπλέει */
        .main-card {
            background: rgba(255, 255, 255, 0.6); 
            backdrop-filter: blur(20px);         
            border-radius: 30px;
            padding: 50px;
            box-shadow: 
                20px 20px 60px #d9d9d9, 
                -20px -20px 60px #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.8);
            width: 90%;
            max-width: 600px;
            text-align: center;
            /*transform-style: preserve-3d; */
        }

        /* 3D Animation: Η κάρτα ακολουθεί το ποντίκι */
        .container {
            /*perspective: 1500px;*/ /* Βάθος πεδίου */
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 40px;
            font-weight: 500;
            letter-spacing: -1px;
        }

        /* Dropdowns: Κομψά και καθαρά */
        .selector-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }

        .select-container {
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        select {
            width: 200px;
            padding: 15px;
            border-radius: 12px;
            box-sizing: border-box;
            border: 1px solid #e0e0e0;
            background: rgba(255, 255, 255, 0.8);
            font-size: 1rem;
            appearance: none; /* Σβήνουμε το προεπιλεγμένο βέλος */
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight:normal;
        }
        select:hover{
            border:1px solid white;
        }
        select:focus {
            border-color: #bbbbbb;
            outline: none;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
        }

        /* Κουμπί Πρόβλεψης */
        .predict-btn {
            background: #1a1a1a;
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 1.1rem;
            border-radius: 100px; /* Στρογγυλό κουμπί */
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .predict-btn:hover {
            background: #333333;
            transform: translateY(-3px); /* Ανύψωση στο hover */
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }

        /* Αποτελέσματα: Floating boxes */
        #result-section {
            margin-top: 50px;
            opacity: 0; /* Κρυμμένο μέχρι να γίνει η πρόβλεψη */
            transform: translateY(20px);
            transition: all 0.5s ease;
        }

        #result-section.show {
            opacity: 1;
            transform: translateY(0);
        }

        .prediction-text {
            font-size: 1.8rem;
            font-weight: 300;
            margin-bottom: 30px;
        }

        .prob-bar-container {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
        }

        .prob-box {
            background: #f8f8f8;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #eeeeee;
        }

        .prob-label {
            font-size: 0.9rem;
            color: #777777;
            margin-bottom: 8px;
        }

        .prob-value {
            font-size: 1.5rem;
            font-weight: 600;
        }

        header{
            background-color: Black;
            height: 50px;
            transition: all 0.1s ease;
            font-family: Ubuntu, sans-serif;
            margin-top: -15px;
            margin-left: -9px;
            margin-right: -10px;
            color: white;
            font-size: 50px;
            border-bottom: 10px solid black;
            align-items: center;
            text-align: center;
        }
        header:hover{
            box-shadow: 0 0 20px #73827f;
            transform: translateY(-5px);
        }
        .navclass{
            margin-left:1.2rem;
            margin-top:15px;
            margin-right:1.2rem;
            font-size:25px;
            font-weight:90;
            align-items: center;
        }
        .awhite {
            margin-top:18px;
            color: white;
            box-sizing: 30px 30px;
            margin-right: -2px;
            transition: all 0.2s ease;
            text-decoration: none;

        }
        a {
        color: black;
        font-size: 25px;
        margin-bottom: 40px;
        text-decoration: none;
        border: none;
        width: fit-content;
        margin-top: 25px;
}
        /* Loading Spinner */
        #loading { display: none; margin-top: 20px; color: #777; }

    </style>
</head>

</html>
