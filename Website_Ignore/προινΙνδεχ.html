<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premier League Predictions</title>
    <style>

        :root {
            --primary: #333333; /* Κομψό γκρι-μαύρο */
            --bg: #ffffff;      /* Καθαρό άσπρο */
            --font: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg);
            font-family: var(--font);
            color: var(--primary);
            overflow: hidden; /* Κρατάμε το 3D εφέ καθαρό */
        }

        /* Η "Γυάλινη" Κάρτα που επιπλέει */
        .main-card {
            background: rgba(255, 255, 255, 0.6); 
            backdrop-filter: blur(20px);         
            border-radius: 30px;
            padding: 50px;
            box-shadow: 
                20px 20px 60px #d9d9d9, 
                -20px -20px 60px #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.8);
            width: 90%;
            max-width: 600px;
            text-align: center;
            /*transform-style: preserve-3d; */
        }

        /* 3D Animation: Η κάρτα ακολουθεί το ποντίκι */
        .container {
            /*perspective: 1500px;*/ /* Βάθος πεδίου */
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 40px;
            font-weight: 500;
            letter-spacing: -1px;
        }

        /* Dropdowns: Κομψά και καθαρά */
        .selector-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }

        .select-container {
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        select {
            width: 200px;
            padding: 15px;
            border-radius: 12px;
            box-sizing: border-box;
            border: 1px solid #e0e0e0;
            background: rgba(255, 255, 255, 0.8);
            font-size: 1rem;
            appearance: none; /* Σβήνουμε το προεπιλεγμένο βέλος */
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight:normal;
        }
        select:hover{
            border:1px solid white;
        }
        select:focus {
            border-color: #bbbbbb;
            outline: none;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
        }

        /* Κουμπί Πρόβλεψης */
        .predict-btn {
            background: #1a1a1a;
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 1.1rem;
            border-radius: 100px; /* Στρογγυλό κουμπί */
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .predict-btn:hover {
            background: #333333;
            transform: translateY(-3px); /* Ανύψωση στο hover */
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }

        /* Αποτελέσματα: Floating boxes */
        #result-section {
            margin-top: 50px;
            opacity: 0; /* Κρυμμένο μέχρι να γίνει η πρόβλεψη */
            transform: translateY(20px);
            transition: all 0.5s ease;
        }

        #result-section.show {
            opacity: 1;
            transform: translateY(0);
        }

        .prediction-text {
            font-size: 1.8rem;
            font-weight: 300;
            margin-bottom: 30px;
        }

        .prob-bar-container {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
        }

        .prob-box {
            background: #f8f8f8;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #eeeeee;
        }

        .prob-label {
            font-size: 0.9rem;
            color: #777777;
            margin-bottom: 8px;
        }

        .prob-value {
            font-size: 1.5rem;
            font-weight: 600;
        }

        /* Loading Spinner */
        #loading { display: none; margin-top: 20px; color: #777; }

    </style>
</head>
<body>

<div class="container">
    <div class="main-card">
        <h1>Football Betting Model by Stepan</h1>
        

        <div class="selector-group">
            <div class="select-container">
                <label>Home Team</label>
                <select id="home_team">
                    <option value="Arsenal">Arsenal</option>
                    <option value="Man City">Man City</option>
                    <option value="Liverpool">Liverpool</option>
                    <option value="Man United">Man United</option>
                    <option value="Tottenham">Tottenham</option>
                    <option value="Chelsea">Chelsea</option>
                    <option value="Nott'm Forest">Nottingham Forest</option>
                    <option value="Wolves">Wolves</option>
                    <option value="Newcastle">Newcastle</option>
                    <option value="Burnley">Burnley</option>
                    <option value="Leeds">Leeds</option>
                    <option value="Aston Villa">Aston Villa</option>
                    <option value="Bournemouth">Bournemouth</option>
                    <option value="Brighton">Brighton</option>
                    <option value="Fulham">Fulham</option>
                    <option value="Sunderland">Sunderland</option>
                    <option value="Crystal Palace">Crystal Palace</option>
                    <option value="West Ham">West Ham</option>
                    <option value="Brentford">Brentford</option>
                    <option value="Everton">Everton</option>
                    
                </select>
            </div>
            <div class="select-container">
                <label>Away Team</label>
                <select id="away_team">
                    <option value="Arsenal">Arsenal</option>
                    <option value="Man City">Man City</option>
                    <option value="Liverpool">Liverpool</option>
                    <option value="Man United">Man United</option>
                    <option value="Tottenham">Tottenham</option>
                    <option value="Chelsea">Chelsea</option>
                    <option value="Nott'm Forest">Nottingham Forest</option>
                    <option value="Wolves">Wolves</option>
                    <option value="Newcastle">Newcastle</option>
                    <option value="Burnley">Burnley</option>
                    <option value="Leeds">Leeds</option>
                    <option value="Aston Villa">Aston Villa</option>
                    <option value="Bournemouth">Bournemouth</option>
                    <option value="Brighton">Brighton</option>
                    <option value="Fulham">Fulham</option>
                    <option value="Sunderland">Sunderland</option>
                    <option value="Crystal Palace">Crystal Palace</option>
                    <option value="West Ham">West Ham</option>
                    <option value="Brentford">Brentford</option>
                    <option value="Everton">Everton</option>
                </select>
            </div>
        </div>

        <button class="predict-btn" id="predictBtn">Predict Result</button>
        <div id="loading">Calculating probabilities...</div>

        <div id="result-section">
            <div class="prediction-text" id="finalPrediction">---</div>

            <div class="prob-bar-container">
                <div class="prob-box">
                    <div class="prob-label">HOME WIN (1)</div>
                    <div class="prob-value" id="probHome">--%</div>
                </div>
                <div class="prob-box">
                    <div class="prob-label">DRAW (X)</div>
                    <div class="prob-value" id="probDraw">--%</div>
                </div>
                <div class="prob-box">
                    <div class="prob-label">AWAY WIN (2)</div>
                    <div class="prob-value" id="probAway">--%</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // JS 1: 3D Animation (TiltEffect)
    const card = document.querySelector('.main-card');
    const container = document.querySelector('.container');

    // container.addEventListener('mousemove', (e) => {
    //     let xAxis = (window.innerWidth / 2 - e.pageX) / 40; // Κίνηση στον X άξονα
    //     let yAxis = (window.innerHeight / 2 - e.pageY) / 40; // Κίνηση στον Y άξονα
    //     card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
    // });

    // Reset το animation στο mouseout
    container.addEventListener('mouseleave', (e) => {
        card.style.transform = `rotateY(0deg) rotateX(0deg)`;
    });


    document.getElementById('predictBtn').addEventListener('click', async () => {
        const homeTeam = document.getElementById('home_team').value;
        const awayTeam = document.getElementById('away_team').value;
        const loading = document.getElementById('loading');
        const resultSection = document.getElementById('result-section');

        // Έλεγχος αν επιλέχθηκε η ίδια ομάδα
        if (homeTeam === awayTeam) {
            alert("Please choose different teams.");
            return;
        }

        // Εμφάνιση loading
        loading.style.display = 'block';
        resultSection.classList.remove('show');


        const requestData = {
            home_team: homeTeam,
            away_team: awayTeam,
            home_days_rest: 7, // Default τιμή για ευκολία
            away_days_rest: 7
        };

    

        try {

            const response = await fetch('http://127.0.0.1:8000/predict', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(requestData),
            });

            if (!response.ok) throw new Error('Error while connecting to the API');

            const result = await response.json();


            document.getElementById('finalPrediction').innerText = result.Prediction;
            document.getElementById('probHome').innerText = result.Home_Win_Prob;
            document.getElementById('probDraw').innerText = result.Draw_Prob;
            document.getElementById('probAway').innerText = result.Away_Win_Prob;


            loading.style.display = 'none';
            resultSection.classList.add('show');

        } catch (error) {
            console.error(error);
            alert("Error while trying to connect with model .");
            loading.style.display = 'none';
        }
    });
</script>

</body>
</html>
